<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 310" width="1056" height="310" role="img" aria-label="XAgent product runtime pipeline">
<defs>
<style>
.title{font:700 18px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#d8dee9}
.label{font:700 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#f0f6fc}
.text{font:500 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#8b949e}
.mono{font:500 12px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;fill:#c9d1d9}
.green{fill:#39d353}.blue{fill:#79c0ff}.purple{fill:#d2a8ff}.orange{fill:#f2cc60}.muted{fill:#6e7681}
</style>
<linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#161b22"/><stop offset="1" stop-color="#111820"/></linearGradient>
<linearGradient id="wire" x1="0" x2="1"><stop offset="0" stop-color="#39d353"/><stop offset=".55" stop-color="#79c0ff"/><stop offset="1" stop-color="#d2a8ff"/></linearGradient>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1056" height="310" rx="10" fill="#0d1117"/>
<rect x="1" y="1" width="1054" height="308" rx="10" fill="none" stroke="#30363d"/>
<text x="34" y="42" class="title">Runtime pipeline</text>
<text x="204" y="42" class="text">from intent to hosted agent product to x402 settlement</text>
<path d="M34 62H1022" stroke="#30363d"/>

<g transform="translate(48 92)">
  <rect width="184" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
  <text x="20" y="28" class="label">Intent</text>
  <text x="20" y="52" class="text">plain language spec</text>
  <circle cx="158" cy="26" r="5" class="green" filter="url(#glow)"/>
</g>
<g transform="translate(292 92)">
  <rect width="184" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
  <text x="20" y="28" class="label">Builder</text>
  <text x="20" y="52" class="text">skills, flows, tools</text>
  <circle cx="158" cy="26" r="5" class="purple" filter="url(#glow)"/>
</g>
<g transform="translate(536 92)">
  <rect width="184" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
  <text x="20" y="28" class="label">Runtime</text>
  <text x="20" y="52" class="text">memory, wallet, accounts</text>
  <circle cx="158" cy="26" r="5" class="blue" filter="url(#glow)"/>
</g>
<g transform="translate(780 92)">
  <rect width="184" height="74" rx="10" fill="url(#card)" stroke="#30363d"/>
  <text x="20" y="28" class="label">Product</text>
  <text x="20" y="52" class="text">marketplace + monetization</text>
  <circle cx="158" cy="26" r="5" class="green" filter="url(#glow)"/>
</g>

<path d="M234 129H286" stroke="url(#wire)" stroke-width="2"/>
<path d="M478 129H530" stroke="url(#wire)" stroke-width="2"/>
<path d="M722 129H774" stroke="url(#wire)" stroke-width="2"/>
<path d="M274 124L286 129L274 134" fill="none" stroke="#79c0ff" stroke-width="2"/>
<path d="M518 124L530 129L518 134" fill="none" stroke="#79c0ff" stroke-width="2"/>
<path d="M762 124L774 129L762 134" fill="none" stroke="#79c0ff" stroke-width="2"/>

<rect x="92" y="204" width="872" height="56" rx="10" fill="#161b22" stroke="#30363d"/>
<text x="116" y="228" class="mono"><tspan class="purple">acts</tspan> · remembers · calls tools · connects accounts · executes with wallet-aware policy</text>
<text x="116" y="248" class="mono"><tspan class="blue">xagent-contracts</tspan> verified · <tspan class="green">xpense</tspan> budgets approvals · <tspan class="green">x402</tspan> settle on-chain · builder pipeline private under NDA</text>
<path d="M628 166V198" stroke="#30363d" stroke-width="2" stroke-dasharray="4 4"/>
<circle cx="628" cy="202" r="4" fill="#39d353"/>

<text x="48" y="288" class="text">canonical path</text>
<rect x="150" y="278" width="13" height="13" rx="3" fill="#39d353"/><text x="172" y="289" class="text">public surface</text>
<rect x="300" y="278" width="13" height="13" rx="3" fill="#79c0ff"/><text x="322" y="289" class="text">runtime contract</text>
<rect x="470" y="278" width="13" height="13" rx="3" fill="#f2cc60"/><text x="492" y="289" class="text">private orchestration</text>
</svg>
