<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 300" width="1056" height="300" role="img" aria-label="XAgent premium product architecture flow">
  <defs>
    <pattern id="boardGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#DCE6E2" stroke-width="1" stroke-opacity=".42"/>
    </pattern>
    <linearGradient id="rail" x1="116" y1="0" x2="940" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset=".48" stop-color="#5BA7FF"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFA"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F3B34" flood-opacity=".07"/>
    </filter>
    <style>
      .eyebrow{font:600 10px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:2.6px;fill:#7B8A86}
      .title{font:500 28px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#15231F}
      .label{font:650 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#1E2A27}
      .caption{font:500 11px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#75827E}
      .mono{font:500 10px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:.55px;fill:#62716C}
      .tiny{font:600 9px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:1.7px;fill:#8E9A96}
    </style>
  </defs>

  <rect width="1056" height="300" rx="18" fill="url(#sheet)"/>
  <rect x="16" y="16" width="1024" height="268" rx="12" fill="url(#boardGrid)"/>
  <rect x="16.5" y="16.5" width="1023" height="267" rx="11.5" fill="none" stroke="#D8E2DE"/>
  <path d="M42 84H1014M42 222H1014" stroke="#D7E2DE"/>
  <path d="M42 84H240M816 222H1014" stroke="#35D18E" stroke-width="1.5"/>

  <text x="42" y="45" class="eyebrow">XAGENT / PRODUCT ARCHITECTURE BOARD</text>
  <text x="42" y="72" class="title">How intent becomes an agent product</text>
  <text x="1014" y="45" text-anchor="end" class="eyebrow">SPEAK / BUILD / RUN / SETTLE</text>

  <path d="M116 153H940" fill="none" stroke="#D2DED9" stroke-width="14" stroke-linecap="round"/>
  <path d="M116 153H940" fill="none" stroke="url(#rail)" stroke-width="2.5" stroke-linecap="round"/>
  <g fill="#FFFFFF" stroke="#AFC0B9" stroke-width="1.25">
    <circle cx="116" cy="153" r="8"/>
    <circle cx="352" cy="153" r="8"/>
    <circle cx="588" cy="153" r="8"/>
    <circle cx="824" cy="153" r="8"/>
    <circle cx="940" cy="153" r="8"/>
  </g>
  <g fill="#34D399">
    <circle cx="116" cy="153" r="3"/>
    <circle cx="352" cy="153" r="3"/>
    <circle cx="588" cy="153" r="3"/>
    <circle cx="824" cy="153" r="3"/>
  </g>
  <circle cx="940" cy="153" r="3" fill="#5BA7FF"/>

  <g filter="url(#lift)">
    <g transform="translate(64 112)">
      <rect width="160" height="82" rx="6" fill="#FFFFFF" stroke="#CBD8D3"/>
      <path d="M16 19H54M16 63H104" stroke="#33D18D" stroke-width="2" stroke-linecap="round"/>
      <text x="16" y="38" class="label">Intent</text>
      <text x="16" y="56" class="caption">natural language brief</text>
      <text x="128" y="22" class="tiny">01</text>
    </g>
    <g transform="translate(300 112)">
      <rect width="160" height="82" rx="6" fill="#FFFFFF" stroke="#CBD8D3"/>
      <path d="M16 19H74M16 63H122" stroke="#5BA7FF" stroke-width="2" stroke-linecap="round"/>
      <text x="16" y="38" class="label">Builder</text>
      <text x="16" y="56" class="caption">skills, tools, flows</text>
      <text x="128" y="22" class="tiny">02</text>
    </g>
    <g transform="translate(536 112)">
      <rect width="160" height="82" rx="6" fill="#FFFFFF" stroke="#CBD8D3"/>
      <path d="M16 19H66M16 63H134" stroke="#33D18D" stroke-width="2" stroke-linecap="round"/>
      <text x="16" y="38" class="label">Runtime</text>
      <text x="16" y="56" class="caption">memory, policy, wallet</text>
      <text x="128" y="22" class="tiny">03</text>
    </g>
    <g transform="translate(772 112)">
      <rect width="160" height="82" rx="6" fill="#FFFFFF" stroke="#CBD8D3"/>
      <path d="M16 19H88M16 63H118" stroke="#5BA7FF" stroke-width="2" stroke-linecap="round"/>
      <text x="16" y="38" class="label">Market</text>
      <text x="16" y="56" class="caption">publish and settle</text>
      <text x="128" y="22" class="tiny">04</text>
    </g>
  </g>

  <g fill="none" stroke="#BFD0CA" stroke-width="1">
    <path d="M224 153H300"/>
    <path d="M460 153H536"/>
    <path d="M696 153H772"/>
  </g>
  <g fill="#FFFFFF" stroke="#32C987" stroke-width="1.5">
    <path d="M288 147L300 153L288 159"/>
    <path d="M524 147L536 153L524 159"/>
    <path d="M760 147L772 153L760 159"/>
  </g>

  <g transform="translate(64 236)">
    <rect width="928" height="32" rx="5" fill="#FFFFFF" stroke="#D4E0DC"/>
    <path d="M14 16H118" stroke="#35D18E" stroke-width="2" stroke-linecap="round"/>
    <path d="M798 16H914" stroke="#5BA7FF" stroke-width="2" stroke-linecap="round"/>
    <text x="140" y="20" class="mono">runtime spine: acts / remembers / calls tools / connects accounts / wallet-aware policy / x402 settlement</text>
  </g>

  <g transform="translate(862 62)">
    <path d="M0 0H130V28H0Z" fill="#FFFFFF" stroke="#D4E0DC"/>
    <circle cx="18" cy="14" r="4" fill="#35D18E"/>
    <text x="34" y="18" class="mono">VERIFIED CONTRACTS</text>
  </g>
</svg>
